<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialiser Windows (2025)</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Helper component for Lucide icons
    const Icon = ({ name, className = "w-6 h-6" }) => {
      React.useEffect(() => {
        lucide.createIcons();
      });
      return React.createElement('i', {
        'data-lucide': name,
        className
      });
    };

    const App = () => {
      const [method, setMethod] = useState(null); // 'usb' or 'intune'
      const [currentStep, setCurrentStep] = useState(0);

      // Données pour la méthode USB
      const usbSteps = [
        {
          title: "Sauvegarde & Avertissement",
          icon: <Icon name="shield-alert" className="w-12 h-12 text-red-500" />,
          content: (
            <div className="space-y-4">
              <p className="font-semibold text-red-600 bg-red-50 p-3 rounded-lg border border-red-200">
                ATTENTION : Cette méthode effacera TOUTES les données présentes sur l'ordinateur.
              </p>
              <p>Avant de commencer, assurez-vous de :</p>
              <ul className="list-disc pl-5 space-y-2 text-gray-700">
                <li>Sauvegarder vos fichiers importants sur un disque externe ou le cloud (OneDrive/Google Drive).</li>
                <li>Avoir une <strong>clé USB de 8 Go minimum</strong> (elle sera aussi effacée !).</li>
                <li>Avoir un autre PC fonctionnel connecté à internet.</li>
              </ul>
            </div>
          )
        },
        {
          title: "Création du support (MCT)",
          icon: <Icon name="download" className="w-12 h-12 text-blue-500" />,
          content: (
            <div className="space-y-4">
              <p>Sur l'ordinateur <strong>fonctionnel</strong> :</p>
              <ol className="list-decimal pl-5 space-y-3 text-gray-700">
                <li>Allez sur le site de Microsoft et cherchez <strong>"Télécharger Windows 11"</strong>.</li>
                <li>Téléchargez l'outil "Création de support d'installation" (Media Creation Tool).</li>
                <li>Lancez l'outil, acceptez les termes.</li>
                <li>Choisissez <strong>"Créer un support d'installation (clé USB...)"</strong>.</li>
                <li>Sélectionnez votre clé USB dans la liste et validez.</li>
              </ol>
              <div className="text-sm text-gray-500 italic mt-2">Patientez jusqu'à la fin du téléchargement (cela peut prendre 15-30 min).</div>
            </div>
          )
        },
        {
          title: "Démarrage sur la clé (Boot)",
          icon: <Icon name="power" className="w-12 h-12 text-purple-500" />,
          content: (
            <div className="space-y-4">
              <p>Sur l'ordinateur <strong>à réinitialiser</strong> :</p>
              <ol className="list-decimal pl-5 space-y-3 text-gray-700">
                <li>Éteignez le PC complètement.</li>
                <li>Insérez la clé USB préparée.</li>
                <li>Allumez le PC et tapotez <strong>immédiatement</strong> et <strong>répétitivement</strong> la touche de "Boot Menu" :</li>
              </ol>
              <div className="grid grid-cols-2 gap-2 text-sm mt-2">
                <div className="bg-gray-100 p-2 rounded">Dell / Lenovo: <strong>F12</strong></div>
                <div className="bg-gray-100 p-2 rounded">HP: <strong>F9</strong></div>
                <div className="bg-gray-100 p-2 rounded">Asus: <strong>Echap</strong> ou <strong>F8</strong></div>
                <div className="bg-gray-100 p-2 rounded">Acer: <strong>F12</strong></div>
              </div>
              <p className="mt-2 text-sm">Sélectionnez votre clé USB (souvent notée "UEFI: Mass Storage") dans la liste.</p>
            </div>
          )
        },
        {
          title: "Nettoyage des disques",
          icon: <Icon name="hard-drive" className="w-12 h-12 text-orange-500" />,
          content: (
            <div className="space-y-4">
              <p>L'installation de Windows démarre :</p>
              <ol className="list-decimal pl-5 space-y-3 text-gray-700">
                <li>Choisissez la langue et faites "Suivant" &gt; "Installer maintenant".</li>
                <li>Si demandé, cliquez sur <strong>"Je n'ai pas de clé produit"</strong>.</li>
                <li>Choisissez "Personnalisé : Installer uniquement Windows (avancé)".</li>
                <li><strong>Étape Cruciale :</strong> Supprimez TOUTES les partitions du "Lecteur 0" une par une jusqu'à n'avoir qu'une seule ligne :</li>
              </ol>
              <div className="bg-gray-800 text-green-400 p-3 rounded font-mono text-center">
                Espace non alloué sur le lecteur 0
              </div>
              <p>Sélectionnez cette ligne et cliquez sur <strong>Suivant</strong>.</p>
            </div>
          )
        },
        {
          title: "Finalisation (OOBE)",
          icon: <Icon name="check-circle" className="w-12 h-12 text-green-500" />,
          content: (
            <div className="space-y-4">
              <p>Windows s'installe et redémarre plusieurs fois.</p>
              <p>Une fois terminé, vous arriverez sur l'écran de configuration initial (OOBE) :</p>
              <ul className="list-disc pl-5 space-y-2 text-gray-700">
                <li>Choisissez votre pays et clavier.</li>
                <li>Connectez-vous au Wi-Fi.</li>
                <li>Choisir "pour une installation professionnelle ou académique".  Donner l'adresse admin avec le mot de passe.</li>
              </ul>
              <p className="text-green-600 font-bold mt-4">Votre PC est comme neuf !</p>
            </div>
          )
        }
      ];

      // Données pour la méthode Intune
      const intuneSteps = [
        {
          title: "Prérequis Admin",
          icon: <Icon name="shield-alert" className="w-12 h-12 text-blue-600" />,
          content: (
            <div className="space-y-4">
              <p>Cette méthode est réservée aux administrateurs informatiques ou aux utilisateurs ayant accès au portail d'entreprise.</p>
              <ul className="list-disc pl-5 space-y-2 text-gray-700">
                <li>Vous devez avoir accès à <strong>intune.microsoft.com</strong>.</li>
                <li>L'appareil cible doit être inscrit (enrolled) dans Intune.</li>
                <li>L'appareil cible doit être connecté à Internet (même s'il est verrouillé).</li>
              </ul>
            </div>
          )
        },
        {
          title: "Accès au Portail",
          icon: <Icon name="cloud-cog" className="w-12 h-12 text-blue-500" />,
          content: (
            <div className="space-y-4">
              <p>Connectez-vous à la console d'administration :</p>
              <div className="bg-gray-100 p-3 rounded text-center font-mono text-blue-600">
                https://intune.microsoft.com
              </div>
              <p>Dans le menu de gauche, naviguez vers :</p>
              <div className="flex items-center gap-2 font-semibold text-gray-800">
                <Icon name="menu" className="w-4 h-4" /> Appareils (Devices) <Icon name="arrow-right" className="w-4 h-4" /> Tous les appareils
              </div>
            </div>
          )
        },
        {
          title: "Sélection de la machine",
          icon: <Icon name="monitor" className="w-12 h-12 text-indigo-500" />,
          content: (
            <div className="space-y-4">
              <p>Trouvez l'ordinateur à réinitialiser dans la liste.</p>
              <ul className="list-disc pl-5 space-y-2 text-gray-700">
                <li>Utilisez la barre de recherche (recherche par nom de série ou nom d'utilisateur).</li>
                <li>Cliquez sur le <strong>nom de l'appareil</strong> pour ouvrir sa fiche détaillée.</li>
              </ul>
              <div className="text-sm bg-yellow-50 border-l-4 border-yellow-400 p-2 text-yellow-700">
                Astuce : Vérifiez la colonne "Dernier check-in" pour vous assurer que l'appareil a communiqué récemment.
              </div>
            </div>
          )
        },
        {
          title: "Lancer le Wipe",
          icon: <Icon name="rotate-ccw" className="w-12 h-12 text-red-500" />,
          content: (
            <div className="space-y-4">
              <p>Dans la barre d'outils en haut de la fiche appareil :</p>
              <ol className="list-decimal pl-5 space-y-3 text-gray-700">
                <li>Cliquez sur le bouton <strong>Réinitialiser</strong> (ou <em>Wipe</em>).</li>
                <li>Une fenêtre de confirmation s'ouvre.</li>
                <li>
                  <strong>Optionnel :</strong> Cochez <em>"Wipe device, but keep enrollment state..."</em> si vous voulez que le PC reste lié à l'entreprise après le reset (idéal pour le redonner à un autre employé).
                </li>
                <li>Cliquez sur <strong>Réinitialiser</strong> en bas de la fenêtre.</li>
              </ol>
            </div>
          )
        },
        {
          title: "Côté Utilisateur",
          icon: <Icon name="check-circle" className="w-12 h-12 text-green-500" />,
          content: (
            <div className="space-y-4">
              <p>L'action est maintenant en file d'attente.</p>
              <ul className="list-disc pl-5 space-y-2 text-gray-700">
                <li>Dès que l'ordinateur cible se synchronise (immédiat ou quelques minutes), il redémarrera tout seul.</li>
                <li>L'utilisateur verra un écran <strong>"Réinitialisation de ce PC"</strong> avec un pourcentage.</li>
                <li>Aucune action physique n'est requise jusqu'à la fin du processus.</li>
              </ul>
            </div>
          )
        }
      ];

      const activeData = method === 'usb' ? usbSteps : intuneSteps;

      const handleNext = () => {
        if (currentStep < activeData.length - 1) {
          setCurrentStep(curr => curr + 1);
        }
      };

      const handlePrev = () => {
        if (currentStep > 0) {
          setCurrentStep(curr => curr - 1);
        }
      };

      const handleReset = () => {
        setMethod(null);
        setCurrentStep(0);
      };

      // Écran d'accueil : Choix de la méthode
      if (!method) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 font-sans">
            <div className="max-w-4xl w-full text-center space-y-8">
              <div className="space-y-2">
                <h1 className="text-4xl font-bold text-slate-800">Réinitialiser Windows (2025)</h1>
                <p className="text-slate-500 text-lg">Choisissez votre méthode pour commencer le guide interactif.</p>
              </div>

              <div className="grid md:grid-cols-2 gap-6 mt-8">
                {/* Carte USB */}
                <button
                  onClick={() => setMethod('usb')}
                  className="group bg-white p-8 rounded-2xl shadow-sm hover:shadow-xl transition-all border-2 border-transparent hover:border-blue-500 flex flex-col items-center gap-4 text-left"
                >
                  <div className="bg-blue-100 p-4 rounded-full group-hover:bg-blue-600 transition-colors">
                    <Icon name="usb" className="w-10 h-10 text-blue-600 group-hover:text-white" />
                  </div>
                  <h2 className="text-2xl font-bold text-slate-800">Clé USB (Clean Install)</h2>
                  <p className="text-slate-500 text-center">
                    La méthode radicale. Efface tout et réinstalle Windows proprement. Idéal pour les bugs majeurs ou les virus. Nécessite une clé USB de 8Go.
                  </p>
                  <div className="mt-4 text-blue-600 font-semibold flex items-center gap-2 group-hover:gap-4 transition-all">
                    Commencer <Icon name="arrow-right" className="w-5 h-5" />
                  </div>
                </button>

                {/* Carte Intune */}
                <button
                  onClick={() => setMethod('intune')}
                  className="group bg-white p-8 rounded-2xl shadow-sm hover:shadow-xl transition-all border-2 border-transparent hover:border-indigo-500 flex flex-col items-center gap-4 text-left"
                >
                  <div className="bg-indigo-100 p-4 rounded-full group-hover:bg-indigo-600 transition-colors">
                    <Icon name="cloud-cog" className="w-10 h-10 text-indigo-600 group-hover:text-white" />
                  </div>
                  <h2 className="text-2xl font-bold text-slate-800">Console Intune</h2>
                  <p className="text-slate-500 text-center">
                    Pour les flottes d'entreprise. Réinitialisation à distance via le cloud. Pas besoin d'accès physique à la machine.
                  </p>
                  <div className="mt-4 text-indigo-600 font-semibold flex items-center gap-2 group-hover:gap-4 transition-all">
                    Commencer <Icon name="arrow-right" className="w-5 h-5" />
                  </div>
                </button>
              </div>
            </div>
          </div>
        );
      }

      // Écran Guide Pas à Pas
      return (
        <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 font-sans">
          <div className="max-w-2xl w-full">

            {/* Header navigation */}
            <button
              onClick={handleReset}
              className="mb-6 flex items-center text-slate-500 hover:text-slate-800 transition-colors"
            >
              <Icon name="arrow-left" className="w-5 h-5 mr-2" /> Retour au choix de la méthode
            </button>

            {/* Barre de progression */}
            <div className="mb-6 flex justify-between items-center px-2">
              {activeData.map((_, idx) => (
                <div key={idx} className="flex-1 flex flex-col items-center relative">
                  <div
                    className={`w-4 h-4 rounded-full z-10 transition-colors duration-300 ${
                      idx <= currentStep ? (method === 'usb' ? 'bg-blue-600' : 'bg-indigo-600') : 'bg-slate-300'
                    }`}
                  />
                  {idx < activeData.length - 1 && (
                    <div className={`absolute top-2 left-[50%] w-full h-1 ${
                      idx < currentStep ? (method === 'usb' ? 'bg-blue-600' : 'bg-indigo-600') : 'bg-slate-200'
                    }`} />
                  )}
                </div>
              ))}
            </div>

            {/* Carte de l'étape */}
            <div className="bg-white rounded-2xl shadow-xl overflow-hidden min-h-[400px] flex flex-col">
              {/* En-tête de la carte */}
              <div className={`p-6 text-white flex items-center gap-4 ${method === 'usb' ? 'bg-blue-600' : 'bg-indigo-600'}`}>
                <div className="bg-white/20 p-3 rounded-lg backdrop-blur-sm">
                  {activeData[currentStep].icon}
                </div>
                <div>
                  <div className="text-sm font-medium opacity-80 uppercase tracking-wider">
                    Étape {currentStep + 1} / {activeData.length}
                  </div>
                  <h2 className="text-2xl font-bold">
                    {activeData[currentStep].title}
                  </h2>
                </div>
              </div>

              {/* Contenu */}
              <div className="p-8 flex-1 text-lg leading-relaxed text-slate-700">
                {activeData[currentStep].content}
              </div>

              {/* Footer de navigation */}
              <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                <button
                  onClick={handlePrev}
                  disabled={currentStep === 0}
                  className={`px-6 py-3 rounded-lg font-medium transition-colors ${
                    currentStep === 0
                      ? 'text-slate-300 cursor-not-allowed'
                      : 'text-slate-600 hover:bg-slate-200'
                  }`}
                >
                  Précédent
                </button>

                {currentStep < activeData.length - 1 ? (
                  <button
                    onClick={handleNext}
                    className={`px-8 py-3 rounded-lg font-bold text-white shadow-lg transform active:scale-95 transition-all flex items-center gap-2 ${
                      method === 'usb'
                        ? 'bg-blue-600 hover:bg-blue-700 shadow-blue-200'
                        : 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-200'
                    }`}
                  >
                    Suivant <Icon name="arrow-right" className="w-5 h-5" />
                  </button>
                ) : (
                  <button
                    onClick={handleReset}
                    className="px-8 py-3 rounded-lg font-bold text-white bg-green-600 hover:bg-green-700 shadow-lg shadow-green-200 transform active:scale-95 transition-all flex items-center gap-2"
                  >
                    Terminer & Recommencer <Icon name="rotate-ccw" className="w-5 h-5" />
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
